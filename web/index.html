<!DOCTYPE html>
<html>
<head>

    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Decimus - Aplicativo profissional para gerenciamento de dízimos, despesas e finanças paroquiais. Controle completo de caixa, relatórios financeiros e autenticação segura para igrejas e comunidades católicas.">
  <meta name="keywords" content="dízimos, finanças paroquia, gestão financeira, aplicativo igreja, controle de caixa, relatórios financeiros">
  <meta name="author" content="Decimus App">
  <!-- Open Graph para compartilhamento em redes sociais -->
  <meta property="og:title" content="Decimus - Gestão de Finanças Paroquiais">
  <meta property="og:description" content="Aplicativo profissional para gerenciamento completo de dízimos, despesas e finanças de paróquias. Controle de caixa, relatórios e autenticação segura.">
  <meta property="og:image" content="https://decimus-app.web.app/imagem1login.png">

  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://decimus-app.web.app">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:description" content="Aplicativo profissional para gerenciamento de dízimos, despesas e finanças paroquiais.">
  <meta name="twitter:image" content="https://decimus-app.web.app/imagem1login.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="decimus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>decimus</title>
